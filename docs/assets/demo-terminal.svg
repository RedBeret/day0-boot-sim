<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic Day 0 demo terminal snapshot</title>
  <desc id="desc">A stylized terminal window showing the Windows PowerShell demo path reaching READY and writing artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="#e5e7eb" />
  <rect x="90" y="70" width="1020" height="580" rx="18" fill="url(#bg)" />
  <rect x="90" y="70" width="1020" height="48" rx="18" fill="#1f2937" />
  <rect x="90" y="100" width="1020" height="18" fill="#1f2937" />
  <circle cx="128" cy="94" r="8" fill="#ef4444" />
  <circle cx="152" cy="94" r="8" fill="#f59e0b" />
  <circle cx="176" cy="94" r="8" fill="#22c55e" />
  <text x="600" y="100" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#d1d5db">Windows PowerShell 7 | day0-boot-sim demo</text>

  <text x="125" y="165" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#93c5fd">PS C:\Users\RedBeret\src\day0-boot-sim&gt; pwsh ./scripts/Invoke-Demo.ps1</text>
  <text x="125" y="220" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#e5e7eb">day0-boot-sim is ready.</text>
  <text x="125" y="260" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#e5e7eb">API: http://localhost:8000</text>
  <text x="125" y="300" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#e5e7eb">Dependencies: dhcp=ok http_files=ok</text>
  <text x="125" y="355" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#86efac">Demo complete.</text>
  <text x="125" y="395" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#86efac">Device edge-lab-01 reached READY.</text>
  <text x="125" y="450" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#e5e7eb">Timeline artifact: reports\edge-lab-01-timeline.json</text>
  <text x="125" y="488" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#e5e7eb">Summary artifact: reports\demo-summary.json</text>
  <text x="125" y="526" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#e5e7eb">Packet capture: pcaps\day0-boot-sim.pcap</text>
  <text x="125" y="595" font-family="Consolas, 'Courier New', monospace" font-size="20" fill="#9ca3af">Local-only. Synthetic-only. Windows-first.</text>
</svg>
